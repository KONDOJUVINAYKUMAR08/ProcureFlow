server {
    # 8080 (unprivileged) not 80: the container runs as non-root, so binding a
    # privileged port (<1024) would need the NET_BIND_SERVICE capability.
    # docker-compose maps the host's :80 -> this container's :8080.
    listen 8080;
    server_name localhost;
    client_max_body_size 20M;

    # Container runs as non-root (nginx uid); redirect nginx's writable temp
    # dirs to /tmp, which is world-writable regardless of base-image baked-in
    # ownership of /var/cache/nginx.
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    # ── API path-routing → per-service containers ─────────────────────────────
    # A $variable upstream defers hostname resolution to request time instead
    # of nginx config-load time, so nginx still starts even if a backend
    # container isn't up yet. 127.0.0.11 is Docker's embedded DNS.
    resolver 127.0.0.11 ipv6=off valid=10s;

    location /api/auth {
        set $upstream http://identity:5001;
        proxy_pass $upstream;
        include /etc/nginx/conf.d/proxy.inc;
    }
    location /api/users {
        set $upstream http://identity:5001;
        proxy_pass $upstream;
        include /etc/nginx/conf.d/proxy.inc;
    }
    location /api/hr {
        set $upstream http://identity:5001;
        proxy_pass $upstream;
        include /etc/nginx/conf.d/proxy.inc;
    }

    location /api/vendors {
        set $upstream http://procurement:5003;
        proxy_pass $upstream;
        include /etc/nginx/conf.d/proxy.inc;
    }
    location /api/purchase-requests {
        set $upstream http://procurement:5003;
        proxy_pass $upstream;
        include /etc/nginx/conf.d/proxy.inc;
    }
    location /api/purchase-orders {
        set $upstream http://procurement:5003;
        proxy_pass $upstream;
        include /etc/nginx/conf.d/proxy.inc;
    }
    location /api/contracts {
        set $upstream http://procurement:5003;
        proxy_pass $upstream;
        include /etc/nginx/conf.d/proxy.inc;
    }

    location /api/invoices {
        set $upstream http://finance:5002;
        proxy_pass $upstream;
        include /etc/nginx/conf.d/proxy.inc;
    }
    location /api/payments {
        set $upstream http://finance:5002;
        proxy_pass $upstream;
        include /etc/nginx/conf.d/proxy.inc;
    }
    location /api/customers {
        set $upstream http://finance:5002;
        proxy_pass $upstream;
        include /etc/nginx/conf.d/proxy.inc;
    }
    location /api/purchases {
        set $upstream http://finance:5002;
        proxy_pass $upstream;
        include /etc/nginx/conf.d/proxy.inc;
    }
    location /api/issuer-profiles {
        set $upstream http://finance:5002;
        proxy_pass $upstream;
        include /etc/nginx/conf.d/proxy.inc;
    }

    location /api/documents {
        set $upstream http://document:5004;
        proxy_pass $upstream;
        include /etc/nginx/conf.d/proxy.inc;
    }
    location /api/notifications {
        set $upstream http://document:5004;
        proxy_pass $upstream;
        include /etc/nginx/conf.d/proxy.inc;
    }
    location /api/audit {
        set $upstream http://document:5004;
        proxy_pass $upstream;
        include /etc/nginx/conf.d/proxy.inc;
    }

    # ── React SPA (static files) ──────────────────────────────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}
